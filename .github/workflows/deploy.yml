name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Prepare source index for Vite build
        run: cp index.dev.html index.html

      - name: Build
        run: npm run build:ci
        env:
          GITHUB_ACTIONS: true
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Publish build to main root (Pages serves main branch)
        run: |
          cp dist/index.html index.html
          cp dist/404.html 404.html
          rm -rf assets
          cp -r dist/assets assets
          cp dist/favicon.svg favicon.svg
          cp dist/ok.html ok.html
          cp dist/icons.svg icons.svg
          touch .nojekyll

      - name: Commit production files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html assets favicon.svg ok.html icons.svg .nojekyll
          git diff --staged --quiet || git commit -m "Deploy: sync production build to main [skip ci]"
          git push

      - name: Deploy to gh-pages branch (backup)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages